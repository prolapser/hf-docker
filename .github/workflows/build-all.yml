name: Dynamic Build and Publish
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        run: |
          SERVICES=()
          echo "=== НАЧАЛО ПОИСКА ==="
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [ "$BEFORE" == "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            echo "ВНИМАНИЕ: Новая ветка. Сравниваем текущий коммит с предыдущим (HEAD~1)."
            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "new_branch")
          else
            DIFF_FILES=$(git diff --name-only $BEFORE $SHA 2>/dev/null || echo "")
          fi

          echo "Измененные файлы в этом пуше:"
          echo "$DIFF_FILES"
          echo "---------------------"

          # Ищем все Dockerfile на любой глубине (игнорируя скрытые папки вроде .git)
          for dockerfile in $(find . -type f -name "Dockerfile" -not -path '*/\.*'); do
            # Извлекаем путь к папке и убираем './' в начале пути (find добавляет его)
            DIR=$(dirname "$dockerfile" | sed 's|^\./||')

            # Если Dockerfile в корне репозитория (DIR == "."), пропускаем или обрабатываем отдельно
            if [ "$DIR" == "." ]; then
              echo "Нашли Dockerfile в корне репозитория, пропускаем..."
              continue
            fi

            echo "Проверяем папку: $DIR"
            HAS_CHANGES=false

            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "  -> Ручной запуск: добавляем в сборку"
              HAS_CHANGES=true
            else
              # Проверяем, есть ли измененные файлы внутри этой папки
              if echo "$DIFF_FILES" | grep -q "^$DIR/"; then
                echo "  -> [V] Найдены изменения в коде!"
                HAS_CHANGES=true
              else
                echo "  -> [X] Изменений нет"
              fi
            fi

            if [ "$HAS_CHANGES" = true ]; then
              SERVICES+=("\"$DIR\"")
            fi
          done

          echo "=== РЕЗУЛЬТАТ ==="

          # Проверяем, пустой ли массив
          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "Нет сервисов для сборки."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY="[$(IFS=,; echo "${SERVICES[*]}")]"
            echo "Собираем: $JSON_ARRAY"
            echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: setup-matrix
    if: ${{ needs.setup-matrix.outputs.matrix != '[]' && needs.setup-matrix.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest